name: V2xsences_where2comm_all.yaml
root_dir: "/home/myData/storage/code/HEAL/dataset/V2XScenes" #TODO
test_dir: "/home/myData/storage/code/HEAL/dataset/V2XScenes" #TODO

train_scenario_list: ['20240709_084703_300_1720486033_to_1720486043_10_37', 
                '20240709_075541_300_1720482952_to_1720482965_13_36', 
                '20240709_172949_300_1720517416_to_1720517437_21_67'] 

test_scenario_list: ['20240709_084703_300_1720486033_to_1720486043_10_37', 
                '20240709_075541_300_1720482952_to_1720482965_13_36', 
                '20240709_172949_300_1720517416_to_1720517437_21_67']

veh_json_path: "./dataset/v2xscenes/calibration/vehicle_update_pose"
road_calib_path: "./dataset/v2xscenes/calibration/Roadlidar_to_global.json"

road_calib_shift:
  - [1.0, 0.0, 0.0, 35.66335754]
  - [0.0, 1.0, 0.0, -177.02045111]
  - [0.0, 0.0, 1.0, -0.35930808]
  - [0.0, 0.0, 0.0, 1.0]
  
train_mode: 'cooperative'
cav_list: ['vehicle', '6691', '6692', '6694', '6696', '6698', '6700', '6701']

yaml_parser: "load_general_params"
train_params:
  batch_size: &batch_size 1
  epoches: 30
  eval_freq: 2
  save_freq: 2
  max_cav: 5

comm_range: 100
input_source: ['lidar']
label_type: 'lidar'
cav_lidar_range: &cav_lidar [-142.4, -142.4, -5, 142.4, 142.4, 3]

heter:
  assignment_path: "/home/myData/storage/code/HEAL/opencood/modality_assign/opv2v_test_culver_city.json" #TODO 
  ego_modality: &ego_modality "m1"
  mapping_dict:
    m1: m1
    m2: m1
    m3: m1
    m4: m1
  modality_setting:
    m1:
      sensor_type: &sensor_type_m1 'lidar'
      core_method: &core_method_m1 "point_pillar"

      # lidar requires preprocess
      preprocess:
        # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
        core_method: 'SpVoxelPreprocessor'
        args:
          voxel_size: &voxel_size [0.4, 0.4, 8]
          max_points_per_voxel: 32
          max_voxel_train: 32000
          max_voxel_test: 70000
        # lidar range for each individual cav.
        cav_lidar_range: *cav_lidar

fusion:
  core_method: 'intermediateheter_v2xscenes'
  dataset: 'v2xscenes'
  args: 
    proj_first: True
    grid_conf: None # place-holder
    data_aug_conf: None # place-holder

preprocess:
  # options: BasePreprocessor, VoxelPreprocessor, BevPreprocessor
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: [0.4, 0.4, 4] # useful
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  # lidar range for each individual cav.
  cav_lidar_range: *cav_lidar

# anchor box related
postprocess:
  class: "Car"
  core_method: 'VoxelPostprocessor' # VoxelPostprocessor, BevPostprocessor supported
  gt_range: *cav_lidar
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 4.9
    w: 1.6
    h: 1.56
    r: &anchor_yaw [-360, 360]
    feature_stride: 4
    num: &anchor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.2
  order: 'hwl' # hwl or lwh
  max_num: 150 # maximum number of objects in a single frame. use this number to make sure different frames has the same dimension in the same batch
  nms_thresh: 0.15
  dir_args: &dir_args
    dir_offset: 0.7853
    num_bins: 2
    anchor_yaw: *anchor_yaw

#  model related
model:
  core_method: heter_model_baseline_v2xscenes
  args:
    ego_modality: *ego_modality
    lidar_range: *cav_lidar

    m1:
      core_method: *core_method_m1
      sensor_type: *sensor_type_m1

      encoder_args:
        voxel_size: *voxel_size
        lidar_range: *cav_lidar
        pillar_vfe:
          use_norm: true
          with_distance: false
          use_absolute_xyz: true
          num_filters: [64]
        point_pillar_scatter:
          num_features: 64

      backbone_args:
        layer_nums: [3, 5, 8]
        layer_strides: [2, 2, 2]
        num_filters: [64, 128, 256]
        upsample_strides: [1, 2, 4]
        num_upsample_filter: [128, 128, 128]
  
      shrink_header: 
        kernal_size: [ 3 ]
        stride: [ 2 ]
        padding: [ 1 ]
        dim: [ 256 ]
        input_dim: 384 # 128 * 3

    fusion_method: where2comm
    where2comm:
      feat_dim: 256

    in_head: 256
    
    anchor_number: *anchor_num
    dir_args: *dir_args

loss:
  core_method: point_pillar_depth_loss
  args:
    pos_cls_weight: 2.0
    cls:
      type: 'SigmoidFocalLoss'
      alpha: 0.25
      gamma: 2.0
      weight: 1.0
    reg:
      type: 'WeightedSmoothL1Loss'
      sigma: 3.0
      codewise: true
      weight: 2.0
    dir:
      type: 'WeightedSoftmaxClassificationLoss'
      weight: 0.2
      args: *dir_args
    depth:
      weight: 1.0

optimizer:
  core_method: Adam
  lr: 0.001
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep #step, multistep and Exponential support
  gamma: 0.1
  step_size: [10, 25]